# Apple Silicon only, tuned for the author's M1 Pro daily driver (ADR 0002 policy, ADR 0003 build knobs).
#
# `target-cpu=apple-m1` is the forward-compatible baseline: M2/M3/M4 are supersets, so the binary still
# runs on any Apple Silicon while getting native NEON/AMX-class codegen and best battery/speed. This is the
# single knob to relax if non-M-series Macs ever matter (use `native` for personal dev-only builds).

[build]
target = "aarch64-apple-darwin"
# Reuse cached dependency compiles across git worktrees (and across CI runs), so a freshly created
# worktree doesn't rebuild the ~14G target from scratch. Requires sccache on PATH: `brew install sccache`
# locally; CI installs it via mozilla-actions/sccache-action (see .github/actions/rust-setup) and sets
# SCCACHE_GHA_ENABLED=true + CARGO_INCREMENTAL=0 so this same wrapper works on the runners (LAWS §8).
# Inspect with `sccache --show-stats`.
rustc-wrapper = "sccache"

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1"]
